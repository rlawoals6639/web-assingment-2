<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index_18</title>
    <script>
      let input = prompt("입력해주세요", "입력");

      let num = parseInt(input);

      let 천 = parseInt(num / 1000);
      let 백 = parseInt((num % 1000) / 100);
      let 십 = parseInt((num % 100) / 10);
      let 일 = parseInt(num % 10);

      alert("천의 자리: " + 천 + "\n백의 자리: " + 백 + "\n십의 자리: " + 십 + "\n일의 자리: " + 일);
    </script>
</head>

</body>
</html>
