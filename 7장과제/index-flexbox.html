<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        div.container {
        display: flex;
        gap: 8px;
        flex-direction: row; 
        flex-wrap: nowrap;   
        width: 1080px;
        margin: 0 auto;
        margin-bottom: 8px;
        }
        div.left{
            flex: 0 0 740px;
            height: 428px;
            background-color: red;
        }
        div.right{
            flex: 0 0 332px;
            height: 428px;
            background-color: blue;
        }
        ul.gnb{
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 8px 0px;
            background-color: green;
            gap: 14px;
        }
        ul.gnb > li{
            list-style-type: none;
        }
        ul.rank {
        display: flex;
        margin-left: auto;
        flex-direction: row;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 0; 
        background-color: yellow;
        }
        ul.rank > li{
            list-style-type: none;
        }
        div.footer{
            height: 80px;
            background-color: yellow;
        }
    </style>
</head>

<!-- head body 분리 -->

<body>
    <div class="container">
        <h1>logo</h1>
    </div>
    <div class="container">
        <ul class="gnb">
            <li>메일</li>
            <li>카페</li>
            <li>블로그</li>
            <li>쇼핑</li>
            <li>사전</li>
            <li>뉴스</li>
            <li>증권</li>
            <li>부동산</li>
            <li>지도</li>
        </ul>
        <ul class="rank">
            <li>실시간 검색 순위</li>
        </ul>
    </div>    
    <div class="container">
        <div class="left"></div>
        <div class="right"></div>
    </div>
    <div class="container">
        <div class="left"></div>
        <div class="right"></div>
    </div>
    <div class="container">
        <div class="footer"></div>
    </div>
</body>
</html>
