<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index4-10</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <form>
        <h2>시작그룹</h2>
        <input id="newopen" type="radio" name="start">
        <label for="newopen">새 탭 페이지 열기</label><br>
        <input id="continue" type="radio" name="start">
        <label for="continue">중단한 위치에서 계속하기</label><br>
        <input id="openspecial" type="radio" name="start">
        <label for="openspecial">특정 페이지 또는 페이지 모음 열기</label><br>

        <h2>개인정보 및 보안</h2>
        <input id="service" type="checkbox" name="security">
        <label for="service">동기화 및 서비스</label><br>
        <input id="allow" type="checkbox" name="security">
        <label for="allow">로그인 허용</label><br>
        <input id="load" type="checkbox" name="security">
        <label for="load">페이지 미리 로드</label><br>
    </form> 
</body>
</html>
